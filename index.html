<!doctype html>
<html lang="tr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Offline Markdown Notes" />
    <title>Markdown Notes</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar panel">
        <div class="brand-row">
          <span class="spark">✶</span>
          <div>
            <p class="brand-kicker">Markdown Notes</p>
            <h1 id="greetingText" class="brand-title">Hey there, Keep Going</h1>
          </div>
        </div>

        <div class="sidebar-tools">
          <input id="searchInput" type="search" placeholder="Notlarda ara..." />
          <select id="sortSelect" aria-label="Sort notes">
            <option value="updated_desc">Son düzenlenen</option>
            <option value="updated_asc">İlk düzenlenen</option>
            <option value="title_asc">Başlık A-Z</option>
            <option value="title_desc">Başlık Z-A</option>
          </select>
        </div>

        <button id="newNoteBtn" class="btn btn-primary" type="button">+ Yeni Not</button>
        <div id="notesList" class="notes-list"></div>
      </aside>

      <main class="main panel">
        <header class="editor-head">
          <input id="titleInput" class="title-input" placeholder="Not başlığı" maxlength="120" />
          <input id="tagsInput" class="tags-input" placeholder="etiketler: iş, fikir" maxlength="120" />

          <select id="fontSelect" class="font-select" title="Yazı tipi">
            <option value="font-sans">Inter / System</option>
            <option value="font-serif">Serif Premium</option>
            <option value="font-mono">Mono Focus</option>
          </select>

          <button id="themeToggle" class="btn" type="button">Tema</button>
          <button id="importBtn" class="btn" type="button">İçe Aktar</button>
          <button id="exportBtn" class="btn" type="button">Dışa Aktar</button>
          <button id="deleteBtn" class="btn btn-danger" type="button">Sil</button>
          <input id="importInput" type="file" accept=".md,text/markdown" hidden />
        </header>

        <section class="split">
          <div class="editor-wrap">
            <label>Markdown</label>
            <textarea id="contentInput" placeholder="# Yazmaya başla..."></textarea>
          </div>
          <article class="preview-wrap">
            <label>Önizleme</label>
            <div id="preview" class="preview"></div>
          </article>
        </section>

        <footer class="status">
          <span id="autosaveStatus">Hazır</span>
          <span id="wordCount">0 kelime</span>
          <span id="lastEdited">Henüz düzenlenmedi</span>
          <span id="versionInfo">Sürüm: 0</span>
        </footer>
      </main>
    </div>

    <script src="js/vendor/marked.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
