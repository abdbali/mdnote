<!doctype html>
<html lang="tr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Offline Markdown Notes" />
    <title>Markdown Notes</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar panel">
        <div class="hero-center">
          <div class="hero-top">
            <span class="star">*</span>
            <p>MARKDOWN NOTES</p>
          </div>
          <h1 id="greetingText" class="brand-title">Hey there,<br />Keep Going</h1>
        </div>

        <div class="sidebar-tools">
          <input id="searchInput" type="search" placeholder="Notlarda ara..." />
          <select id="sortSelect" aria-label="Sort notes">
            <option value="updated_desc">Son düzenlenen</option>
            <option value="updated_asc">İlk düzenlenen</option>
            <option value="title_asc">Başlık A-Z</option>
            <option value="title_desc">Başlık Z-A</option>
          </select>
          <button id="newNoteBtn" class="btn btn-primary" type="button">+ Yeni Not</button>
        </div>

        <div id="notesList" class="notes-list"></div>
      </aside>

      <main class="main panel">
        <section class="editor-card">
          <label>Not Alanı</label>
          <textarea id="contentInput" placeholder="# Bugün ne yazmak istersin?"></textarea>
        </section>

        <section id="previewPane" class="preview-wrap hidden">
          <label>Önizleme</label>
          <div id="preview" class="preview"></div>
        </section>

        <footer class="composer-bar">
          <button id="plusBtn" class="plus-btn" type="button" aria-label="actions">+</button>

          <input id="titleInput" class="dock-input" placeholder="Başlık" maxlength="120" />
          <input id="tagsInput" class="dock-input" placeholder="tag: iş, fikir" maxlength="120" />
          <span id="createdInfo" class="meta-pill">Tarih: -</span>

          <select id="fontSelect" class="dock-control" title="Yazı tipi">
            <option value="font-sans">Inter / System</option>
            <option value="font-serif">Serif Premium</option>
            <option value="font-mono">Mono Focus</option>
          </select>
          <button id="previewToggle" class="dock-control" type="button">Önizleme</button>
          <button id="themeToggle" class="dock-control" type="button">Tema</button>
          <button id="importBtn" class="dock-control" type="button">İçe Aktar</button>
          <button id="exportBtn" class="dock-control" type="button">Dışa Aktar</button>
          <button id="deleteBtn" class="dock-control danger" type="button">Sil</button>
          <input id="importInput" type="file" accept=".md,text/markdown" hidden />
        </footer>

        <div class="status">
          <span id="autosaveStatus">Hazır</span>
          <span id="wordCount">0 kelime</span>
          <span id="lastEdited">Henüz düzenlenmedi</span>
          <span id="versionInfo">Sürüm: 0</span>
        </div>
      </main>
    </div>

    <script src="js/vendor/marked.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
